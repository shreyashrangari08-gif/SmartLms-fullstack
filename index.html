<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLMS - Professional Catalog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">SmartLMS</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Global Career Library</h1>
            <input type="text" id="searchInput" onkeyup="filterCourses()" placeholder="Search 500+ modules...">
        </section>

        <div class="filters">
            <button onclick="renderCourses('All')">All</button>
            <button onclick="renderCourses('Google')">Google</button>
            <button onclick="renderCourses('Azure')">Azure</button>
            <button onclick="renderCourses('AWS')">AWS</button>
        </div>

        <section class="catalog">
            <div class="course-grid" id="courseGrid"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>

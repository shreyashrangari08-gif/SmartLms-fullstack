<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLMS | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">🚀 SmartLMS Dashboard</div>
        <nav><a href="#">Home</a> <a href="#">Login</a> <a href="#">Register</a></nav>
    </header>

    <main>
        <section class="hero">
            <h1>Infosys & Global Career Library</h1>
            <p>Curated pathways from top tech leaders</p>
        </section>

        <section class="catalog">
            <h2>Program Catalog</h2>
            <div class="course-grid" id="courseGrid"></div>
        </section>
    </main>

    <div id="courseModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">×</span>
            <div id="playerArea"></div>
            <div id="quizArea" style="display:none;">
                <h3>Final Assessment</h3>
                <p>Complete the quiz to get your certificate.</p>
                <button onclick="finishAssessment()">Submit & Get Certificate</button>
            </div>
            <button id="assessmentBtn" style="display:none;" onclick="startAssessment()">Start Assessment</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

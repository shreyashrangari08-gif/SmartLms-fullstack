<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLMS - Professional Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">SmartLMS</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Infosys & Global Career Library</h1>
            <p>Explore an endless catalog of certification pathways.</p>
            <div class="search-box">
                <input type="text" id="searchInput" onkeyup="filterCourses()" placeholder="Search 500+ courses...">
            </div>
        </section>

        <div class="filters">
            <button onclick="renderCourses('All')">All Collections</button>
            <button onclick="renderCourses('Google')">Google Tracks</button>
            <button onclick="renderCourses('Azure')">Microsoft Systems</button>
        </div>

        <section class="catalog">
            <div class="course-grid" id="courseGrid">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
